<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frame UI</title>
    <meta
      name="description"
      content="Frame UI is a Web Component to add realistic-looking frames to DOM elements."
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body
    class="bg-neutral-100 text-neutral-900 selection:bg-neutral-900 selection:text-white font-heading overflow-x-hidden"
  >
    <!-- Hero -->
    <section
      class="w-full min-h-svh flex flex-col justify-center relative overflow-hidden py-20"
    >
      <!-- Subtle wall texture -->
      <div
        class="absolute inset-0 z-0 pointer-events-none opacity-[0.03]"
        style="
          background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox=%270 0 256 256%27 xmlns=%27http://www.w3.org/2000/svg%27%3E%3Cfilter id=%27noise%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.9%27 numOctaves=%274%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%25%27 height=%27100%25%27 filter=%27url(%23noise)%27/%3E%3C/svg%3E&quot;);
          background-size: 200px 200px;
        "
      ></div>

      <div
        class="relative z-10 max-w-[1600px] mx-auto w-full px-6 md:px-16 lg:px-20"
      >
        <div
          class="grid grid-cols-1 lg:grid-cols-[1fr_auto] gap-12 lg:gap-20 items-center"
        >
          <!-- Left: type + controls -->
          <div class="space-y-10">
            <div class="flex items-center gap-6 opacity-30">
              <div class="flex items-center gap-2">
                <img
                  src="https://cdn.simpleicons.org/lit/black"
                  class="w-5 h-5 grayscale"
                  alt="Lit"
                />
                <span class="text-sm uppercase tracking-[0.2em]">Lit</span>
              </div>
              <div class="flex items-center gap-2">
                <img
                  src="https://cdn.simpleicons.org/shadcnui/black"
                  class="w-5 h-5 grayscale"
                  alt="shadcn/ui"
                />
                <span class="text-sm uppercase tracking-[0.2em]">shadcn</span>
              </div>
            </div>

            <h1
              class="text-6xl md:text-8xl lg:text-[10rem] xl:text-[12rem] font-black text-neutral-900 leading-[0.8] -tracking-[0.02em] uppercase"
            >
              Realistic<br />Frames<br />for DOM<br />Elements
            </h1>

            <!-- Controls row: Mat Size -->
            <div class="space-y-4">
              <div
                class="text-[10px] uppercase tracking-[0.2em] text-neutral-400"
              >
                Mat Size
              </div>
              <div class="flex flex-wrap items-center gap-3">
                <button
                  data-mat-size="none"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  none
                </button>
                <button
                  data-mat-size="sm"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  sm
                </button>
                <button
                  data-mat-size="md"
                  class="px-4 py-2 border border-neutral-900 bg-neutral-900 text-white text-xs transition-all uppercase tracking-[0.15em] shadow-lg"
                >
                  md
                </button>
                <button
                  data-mat-size="lg"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  lg
                </button>
                <button
                  data-mat-size="xl"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  xl
                </button>
              </div>
            </div>

            <!-- Controls row: Frame Width -->
            <div class="space-y-4">
              <div
                class="text-[10px] uppercase tracking-[0.2em] text-neutral-400"
              >
                Frame Width
              </div>
              <div class="flex flex-wrap items-center gap-3">
                <button
                  data-frame-width="xs"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  xs
                </button>
                <button
                  data-frame-width="sm"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  sm
                </button>
                <button
                  data-frame-width="md"
                  class="px-4 py-2 border border-neutral-900 bg-neutral-900 text-white text-xs transition-all uppercase tracking-[0.15em] shadow-lg"
                >
                  md
                </button>
                <button
                  data-frame-width="lg"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  lg
                </button>
                <button
                  data-frame-width="xl"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  xl
                </button>
              </div>
            </div>

            <!-- Controls row: Material & Glass -->
            <div class="space-y-4">
              <div
                class="text-[10px] uppercase tracking-[0.2em] text-neutral-400"
              >
                Finish & Extras
              </div>
              <div class="flex flex-wrap items-center gap-3">
                <button
                  data-material="satin"
                  class="px-4 py-2 border border-neutral-900 bg-neutral-900 text-white text-xs transition-all uppercase tracking-[0.15em] shadow-lg"
                >
                  black
                </button>
                <button
                  data-material="white"
                  class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
                >
                  white
                </button>
                <div class="w-px h-5 bg-neutral-300 mx-1"></div>
                <button
                  id="glass-toggle"
                  class="px-4 py-2 border border-neutral-900 bg-neutral-900 text-white text-xs transition-all uppercase tracking-[0.15em] shadow-lg"
                >
                  glass
                </button>
              </div>
            </div>

            <!-- Install command -->
            <div class="max-w-xl">
              <div
                class="bg-white/60 backdrop-blur-sm p-6 border border-neutral-200/60"
              >
                <code
                  class="font-mono text-sm text-neutral-700 select-all block w-full overflow-x-auto"
                  ><span class="opacity-30 mr-3">$</span>npx shadcn@latest add
                  "https://frameui.com/r/frame-ui.json"</code
                >
              </div>
            </div>
          </div>

          <!-- Right: interactive frame -->
          <div
            class="flex flex-col items-center lg:items-end justify-center gap-6"
          >
            <frame-ui
              id="playground-frame"
              mat-size="sm"
              glass
              class="shadow-[0_60px_100px_-20px_rgba(0,0,0,0.3)] transition-all duration-700 ease-out hover:scale-[1.01]"
            >
              <img
                src="https://www.malikafavre.com/cdn/shop/files/Montreux-Jazz_black_498x698_stamping_cc8514d9-6185-4ff9-8b1b-adca5aa32dab.jpg"
                alt="2017 Montreux Jazz poster by Malika Favre"
                class="w-full max-w-[240px] md:max-w-[320px] lg:max-w-[380px] block"
              />
            </frame-ui>

            <p
              class="text-[10px] uppercase tracking-widest text-neutral-400 text-center lg:text-right"
            >
              Art by
              <a
                href="https://www.malikafavre.com/products/montreux-jazz-festival-electric-blue?_pos=1&_psq=jazz&_ss=e&_v=1.0"
                target="_blank"
                rel="noopener noreferrer"
                class="hover:text-neutral-900 transition-colors underline decoration-neutral-300 hover:decoration-neutral-900 underline-offset-4"
                >Malika Favre</a
              >
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Gallery Wall -->
    <div
      class="py-24 bg-neutral-200/50 border-y border-neutral-200 overflow-x-auto no-scrollbar snap-x snap-mandatory"
    >
      <div
        class="flex flex-row items-center justify-start gap-32 px-10 md:px-20 min-w-max"
      >
        <div
          class="shrink-0 transition-all duration-1000 hover:scale-[1.02] snap-center"
        >
          <frame-ui mat-size="sm" class="shadow-2xl">
            <div
              class="w-80 bg-neutral-900 text-neutral-100 p-8 flex flex-col gap-8"
            >
              <div class="flex justify-between items-start">
                <div>
                  <div
                    class="text-[10px] tracking-widest text-neutral-500 uppercase mb-1"
                  >
                    System Status
                  </div>
                  <div
                    class="text-3xl font-black tracking-tighter leading-none"
                  >
                    OPTIMAL
                  </div>
                </div>
                <!-- Pulsing indicator -->
                <div class="flex h-3 w-3 relative mt-1">
                  <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-neutral-400 opacity-75"
                  ></span>
                  <span
                    class="relative inline-flex rounded-full h-3 w-3 bg-white"
                  ></span>
                </div>
              </div>

              <div class="h-px w-full bg-neutral-800"></div>

              <div class="grid grid-cols-2 gap-6">
                <div>
                  <div
                    class="text-[9px] tracking-widest text-neutral-500 uppercase mb-2"
                  >
                    Latency
                  </div>
                  <div class="text-xl font-mono tracking-tight">
                    12<span class="text-xs text-neutral-500 ml-1">ms</span>
                  </div>
                </div>
                <div>
                  <div
                    class="text-[9px] tracking-widest text-neutral-500 uppercase mb-2"
                  >
                    Uptime
                  </div>
                  <div class="text-xl font-mono tracking-tight">
                    99.9<span class="text-xs text-neutral-500 ml-1">%</span>
                  </div>
                </div>
                <div class="col-span-2">
                  <div class="flex justify-between items-center mb-3">
                    <div
                      class="text-[9px] tracking-widest text-neutral-500 uppercase"
                    >
                      Network Load
                    </div>
                    <div class="text-[9px] font-mono text-neutral-400">65%</div>
                  </div>
                  <div class="w-full h-[2px] bg-neutral-800">
                    <div
                      class="h-full bg-white w-[65%] shadow-[0_0_10px_rgba(255,255,255,0.5)]"
                    ></div>
                  </div>
                </div>
              </div>

              <div
                class="mt-2 pt-6 border-t border-neutral-800 flex justify-between items-center"
              >
                <div
                  class="text-[9px] tracking-widest text-neutral-500 font-mono"
                >
                  SYS.491.A
                </div>
                <button
                  class="px-4 py-2 border border-neutral-700 hover:border-white hover:bg-white hover:text-neutral-900 text-[9px] font-bold tracking-widest uppercase transition-all duration-300"
                >
                  Run Diag
                </button>
              </div>
            </div>
          </frame-ui>
        </div>

        <!-- Landscape Video centerpiece -->
        <div
          class="shrink-0 transition-all duration-1000 hover:scale-[1.02] snap-center"
        >
          <frame-ui
            mat-size="sm"
            class="shadow-[0_80px_100px_-30px_rgba(0,0,0,0.3)]"
          >
            <iframe
              class="w-[320px] md:w-[600px] lg:w-[800px] aspect-video border-none block grayscale hover:grayscale-0 transition-all duration-1000"
              src="https://www.youtube.com/embed/kOZC9X97-fQ?controls=0&autoplay=1&mute=1&loop=1&playlist=kOZC9X97-fQ"
              title="Video content"
              allow="autoplay; encrypted-media"
              allowfullscreen
            ></iframe>
          </frame-ui>
        </div>

        <!-- Third-party Iframe (Map) -->
        <div
          class="shrink-0 transition-all duration-1000 hover:scale-[1.02] snap-center pr-20"
        >
          <frame-ui mat-size="sm" glass class="shadow-2xl">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.0197137114214!2d-74.01144318839137!3d40.73959173580652!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25894ea097337%3A0xc63f52f9d53d7889!2sWhitney%20Museum%20of%20American%20Art!5e0!3m2!1sen!2snz!4v1772314247626!5m2!1sen!2snz"
              class="w-64 h-48 md:w-96 md:h-72 border-none block grayscale contrast-125"
              loading="lazy"
            ></iframe>
          </frame-ui>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer
      class="max-w-[1600px] mx-auto px-6 md:px-16 lg:px-20 py-16 flex justify-between items-center text-xs text-neutral-400 uppercase tracking-[0.2em]"
    >
      <a
        href="https://chrctr.dev"
        class="hover:text-neutral-900 transition-colors"
        >Character Development</a
      >
      <a
        href="https://github.com/gmlnchv/frameui"
        class="hover:text-neutral-900 transition-colors"
        >GitHub</a
      >
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
