<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frame UI</title>
    <meta
      name="description"
      content="Frame UI is a Web Component to add realistic-looking frames to DOM elements."
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body
    class="bg-neutral-100 text-neutral-900 selection:bg-neutral-900 selection:text-white font-heading overflow-x-hidden"
  >
    <!-- Hero: type + frame side by side -->
    <section
      class="w-full min-h-[100svh] flex flex-col justify-center relative overflow-hidden"
    >
      <!-- Subtle wall texture behind frame -->
      <div
        class="absolute inset-0 z-0 bg-cover bg-center pointer-events-none opacity-30 grayscale"
        style="background-image: url(&quot;/background.webp&quot;)"
      ></div>
      <div class="absolute inset-0 z-1 bg-neutral-100/80"></div>

      <div
        class="relative z-10 max-w-[1600px] mx-auto w-full px-6 md:px-16 lg:px-20"
      >
        <div
          class="grid grid-cols-1 lg:grid-cols-[1fr_auto] gap-12 lg:gap-20 items-center"
        >
          <!-- Left: type block -->
          <div class="space-y-10">
            <div class="flex items-center gap-6 opacity-30">
              <div class="flex items-center gap-2">
                <img
                  src="https://cdn.simpleicons.org/lit/black"
                  class="w-5 h-5 grayscale"
                  alt="Lit"
                />
                <span class="text-sm uppercase tracking-[0.2em]">Lit</span>
              </div>
              <div class="flex items-center gap-2">
                <img
                  src="https://cdn.simpleicons.org/shadcnui/black"
                  class="w-5 h-5 grayscale"
                  alt="shadcn/ui"
                />
                <span class="text-sm uppercase tracking-[0.2em]">shadcn</span>
              </div>
            </div>

            <h1
              class="text-6xl md:text-8xl lg:text-[10rem] xl:text-[12rem] font-black text-neutral-900 leading-[0.85] -tracking-[0.02em] uppercase"
            >
              Realistic<br />Frames<br />for DOM<br />Elements
            </h1>

            <div class="max-w-xl pt-4">
              <div
                class="bg-white/60 backdrop-blur-sm p-6 border border-neutral-200/60"
              >
                <code
                  class="font-mono text-sm md:text-base text-neutral-700 select-all block w-full overflow-x-auto"
                  ><span class="opacity-30 mr-3">$</span>npx shadcn@latest add
                  "https://frameui.com/r/frame-ui.json"</code
                >
              </div>
            </div>
          </div>

          <!-- Right: hero frame -->
          <div class="flex justify-center lg:justify-end">
            <frame-ui
              id="hero-frame"
              mat-size="large"
              glass
              class="shadow-[0_60px_100px_-20px_rgba(0,0,0,0.3)] transition-all duration-1000 ease-out hover:scale-[1.01]"
            >
              <img
                src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1200"
                alt="Museum Artwork"
                class="w-full max-w-[240px] md:max-w-[320px] lg:max-w-[380px] block"
              />
            </frame-ui>
          </div>
        </div>
      </div>
    </section>

    <!-- Interactive Playground -->
    <section class="max-w-[1600px] mx-auto px-6 md:px-16 lg:px-20 py-20">
      <div class="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-16 items-start">
        <div class="flex justify-center items-center min-h-[600px]">
          <frame-ui
            id="playground-frame"
            mat-size="standard"
            glass
            class="shadow-2xl transition-all duration-700"
          >
            <img
              src="https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=800"
              class="w-72 block"
              alt="Artwork"
            />
          </frame-ui>
        </div>

        <div class="space-y-8 lg:pt-16">
          <div class="flex flex-wrap gap-3" id="mat-size-controls">
            <button
              data-mat-size="none"
              class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
            >
              None
            </button>
            <button
              data-mat-size="small"
              class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
            >
              Small
            </button>
            <button
              data-mat-size="standard"
              class="px-4 py-2 border border-neutral-900 bg-neutral-900 text-white text-xs transition-all uppercase tracking-[0.15em] shadow-lg"
            >
              Standard
            </button>
            <button
              data-mat-size="large"
              class="px-4 py-2 border border-neutral-300 bg-transparent text-xs hover:border-neutral-900 transition-all uppercase tracking-[0.15em]"
            >
              Large
            </button>
          </div>

          <button
            id="glass-toggle"
            class="px-4 py-2 border border-neutral-900 bg-neutral-900 text-white text-xs transition-all uppercase tracking-[0.15em] shadow-lg"
          >
            Glass
          </button>
        </div>
      </div>
    </section>

    <!-- Gallery Wall -->
    <div
      class="py-24 bg-neutral-200/50 border-y border-neutral-200 overflow-x-auto no-scrollbar snap-x snap-mandatory"
    >
      <div
        class="flex flex-row items-center justify-start gap-32 px-10 md:px-20 min-w-max"
      >
        <div
          class="shrink-0 transition-all duration-1000 hover:scale-[1.02] snap-center"
        >
          <frame-ui mat-size="small" class="shadow-2xl">
            <div class="w-72 bg-white flex flex-col p-10 gap-8">
              <div
                class="bg-neutral-50/50 text-neutral-900 border border-neutral-100 p-2 shadow-sm"
              >
                <div class="flex items-center gap-4 px-3 py-3 text-left">
                  <span
                    class="relative flex shrink-0 overflow-hidden h-10 w-10 rounded-full bg-neutral-200/50"
                  >
                    <img
                      class="h-full w-full grayscale"
                      alt="Avatar"
                      src="https://api.dicebear.com/9.x/notionists/svg?seed=Milo"
                    />
                  </span>
                  <div
                    class="grid flex-1 text-left text-sm leading-tight grayscale"
                  >
                    <span
                      class="truncate font-bold uppercase tracking-wider text-xs"
                      >Frame_UI</span
                    >
                    <span
                      class="text-neutral-400 truncate text-[10px] tracking-widest uppercase"
                      >System Admin</span
                    >
                  </div>
                </div>
                <div class="bg-neutral-200/40 mx-2 my-2 h-px"></div>
                <div class="p-1 space-y-1">
                  <div
                    class="hover:bg-neutral-100 text-neutral-400 relative flex cursor-default items-center gap-3 px-3 py-2 text-[10px] tracking-widest uppercase transition-colors"
                  >
                    Account
                  </div>
                  <div
                    class="hover:bg-neutral-100 text-neutral-400 relative flex cursor-default items-center gap-3 px-3 py-2 text-[10px] tracking-widest uppercase transition-colors"
                  >
                    Billing
                  </div>
                </div>
              </div>
            </div>
          </frame-ui>
        </div>

        <!-- Landscape Video centerpiece -->
        <div
          class="shrink-0 transition-all duration-1000 hover:scale-[1.02] snap-center"
        >
          <frame-ui
            mat-size="small"
            class="shadow-[0_80px_100px_-30px_rgba(0,0,0,0.3)]"
          >
            <iframe
              class="w-[320px] md:w-[600px] lg:w-[800px] aspect-video border-none block grayscale hover:grayscale-0 transition-all duration-1000"
              src="https://www.youtube.com/embed/kOZC9X97-fQ?controls=0&autoplay=1&mute=1&loop=1&playlist=kOZC9X97-fQ"
              title="Video content"
              allow="autoplay; encrypted-media"
              allowfullscreen
            ></iframe>
          </frame-ui>
        </div>

        <!-- Third-party Iframe (Map) -->
        <div
          class="shrink-0 transition-all duration-1000 hover:scale-[1.02] snap-center pr-20"
        >
          <frame-ui mat-size="small" glass class="shadow-2xl">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.0197137114214!2d-74.01144318839137!3d40.73959173580652!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25894ea097337%3A0xc63f52f9d53d7889!2sWhitney%20Museum%20of%20American%20Art!5e0!3m2!1sen!2snz!4v1772314247626!5m2!1sen!2snz"
              class="w-64 h-48 md:w-96 md:h-72 border-none block grayscale contrast-125"
              loading="lazy"
            ></iframe>
          </frame-ui>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer
      class="max-w-[1600px] mx-auto px-6 md:px-16 lg:px-20 py-16 flex justify-between items-center text-xs text-neutral-400 uppercase tracking-[0.2em]"
    >
      <a
        href="https://chrctr.dev"
        class="hover:text-neutral-900 transition-colors"
        >Character Development</a
      >
      <a href="#" class="hover:text-neutral-900 transition-colors">GitHub</a>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
